<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>if(!sessionStorage.getItem('slAlunoRA')){window.location.replace('login.html');}</script>
  <title>Portal do Aluno – Sala de Leitura</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .portal-hero {
      background: linear-gradient(135deg, #006064 0%, #00838f 45%, #00BCD4 100%);
      border-radius: var(--radius);
      padding: 36px 40px;
      color: #fff;
      margin-bottom: 28px;
      position: relative;
      overflow: hidden;
    }
    .portal-hero::after { content:'🎓'; position:absolute; right:30px; bottom:-10px; font-size:120px; opacity:.1; }
    .portal-hero h2 { font-size: 1.6rem; font-weight: 800; margin-bottom: 6px; }
    .portal-hero p { opacity: .9; }

    /* Carousel */
    .carousel-container { position: relative; overflow: hidden; border-radius: var(--radius); margin-bottom: 28px; }
    .carousel-track { display: flex; transition: transform .4s ease; }
    .carousel-slide {
      min-width: 100%; padding: 36px 40px;
      background: linear-gradient(135deg, #006064, #00BCD4);
      color: #fff; display: flex; align-items: center; gap: 32px;
    }
    .carousel-slide:nth-child(2) { background: linear-gradient(135deg, #1a237e, #3949ab); }
    .carousel-slide:nth-child(3) { background: linear-gradient(135deg, #880e4f, #d81b60); }
    .carousel-slide:nth-child(4) { background: linear-gradient(135deg, #1b5e20, #43a047); }
    .carousel-slide:nth-child(5) { background: linear-gradient(135deg, #e65100, #fb8c00); }
    .carousel-book-icon { font-size: 5rem; flex-shrink: 0; }
    .carousel-info h3 { font-size: 1.4rem; font-weight: 800; margin-bottom: 6px; }
    .carousel-info p { opacity: .85; font-size: .95rem; margin-bottom: 8px; }
    .carousel-nav { display: flex; align-items: center; justify-content: center; gap: 12px; margin-top: 12px; }
    .carousel-nav button { background:none;border:none;cursor:pointer;font-size:1.4rem;opacity:.5;transition:.2s; padding:4px 8px; }
    .carousel-nav button:hover { opacity:1; }
    .carousel-dots { display:flex;gap:6px; }
    .carousel-dot { width:9px;height:9px;border-radius:50%;background:var(--primary-light);border:none;cursor:pointer;transition:var(--transition); }
    .carousel-dot.active { background:var(--primary-dark);transform:scale(1.3); }

    /* Login panel */
    .login-panel { background:var(--white); border-radius:var(--radius); padding:32px; box-shadow:var(--card-shadow); border:1px solid var(--border); max-width:440px; margin:0 auto; text-align:center; }
    .login-panel h2 { margin-bottom:6px; color:var(--primary-dark); }
    .login-panel p { color:var(--text-light); font-size:.9rem; margin-bottom:24px; }

    /* Student dashboard */
    .student-header { display:flex;align-items:center;gap:16px;background:var(--primary-xlight);border-radius:var(--radius);padding:18px 22px;margin-bottom:24px;border:1.5px solid var(--primary-light); }
    .student-avatar { width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:700;flex-shrink:0; }
    .tab-nav { display:flex;gap:4px;background:#eceff1;border-radius:10px;padding:4px;margin-bottom:24px; }
    .tab-btn { flex:1;padding:10px;border:none;border-radius:8px;cursor:pointer;font-size:.88rem;font-weight:600;color:var(--text-light);background:none;transition:var(--transition); }
    .tab-btn.active { background:#fff;color:var(--primary-dark);box-shadow:0 2px 8px rgba(0,0,0,.1); }
    .tab-content { display:none; }
    .tab-content.active { display:block; }
  </style>
</head>
<body>
<header class="header">
  <div class="header-inner">
    <div class="header-logo">📚</div>
    <div class="header-titles">
      <h1>SALA DE LEITURA</h1>
      <p>EE Miquelina Pedroso Magnani Professora</p>
    </div>
    <nav class="header-nav">
      <a href="index.html" class="btn-home">🏠 Início</a>
      <a href="consultar-livros.html">🔍 Acervo</a>
    </nav>
  </div>
</header>

<div class="page-container">

  <!-- Featured Books Carousel -->
  <div class="carousel-container" id="featuredCarousel">
    <div class="carousel-track" id="carouselTrack"></div>
  </div>
  <div class="carousel-nav">
    <button onclick="carouselPrev()">‹</button>
    <div class="carousel-dots" id="carouselDots"></div>
    <button onclick="carouselNext()">›</button>
  </div>

  <!-- Student Dashboard -->
  <div id="studentDashboard">
    <div class="student-header">
      <div class="student-avatar" id="studentAvatar">?</div>
      <div style="flex:1">
        <div class="fw-bold" style="font-size:1.1rem" id="studentName"></div>
        <div class="text-muted" id="studentInfo"></div>
      </div>
      <button class="btn btn-secondary btn-sm" onclick="Auth.logoutAluno()">🚪 Sair</button>
    </div>

    <!-- Stats bar -->
    <div class="stats-bar mb-3" style="grid-template-columns:repeat(3,1fr)">
      <div class="stat-card"><div class="stat-icon">📖</div><div class="stat-info"><h3 id="sdAtivos">0</h3><p>Empréstimos Ativos</p></div></div>
      <div class="stat-card warning"><div class="stat-icon">⚠️</div><div class="stat-info"><h3 id="sdAtrasados">0</h3><p>Em Atraso</p></div></div>
      <div class="stat-card success"><div class="stat-icon">✅</div><div class="stat-info"><h3 id="sdHistorico">0</h3><p>Total no Histórico</p></div></div>
    </div>

    <div class="tab-nav">
      <button class="tab-btn active" onclick="switchTab('loans')">📤 Empréstimos Ativos</button>
      <button class="tab-btn" onclick="switchTab('history')">📜 Histórico</button>
      <button class="tab-btn" onclick="switchTab('search')">🔍 Buscar Livros</button>
    </div>

    <!-- Loans Tab -->
    <div class="tab-content active" id="tabLoans">
      <div id="activeLoansPortal"></div>
    </div>

    <!-- History Tab -->
    <div class="tab-content" id="tabHistory">
      <div class="table-wrapper">
        <table>
          <thead><tr><th>Livro</th><th>Empréstimo</th><th>Prazo</th><th>Devolvido</th><th>Status</th><th>Multa</th></tr></thead>
          <tbody id="historyTable"></tbody>
        </table>
      </div>
    </div>

    <!-- Search Tab -->
    <div class="tab-content" id="tabSearch">
      <div class="filter-bar" style="margin-bottom:18px">
        <div class="search-input-wrap" style="flex:3;min-width:200px">
          <label style="display:block;font-size:.78rem;font-weight:600;color:var(--text-light);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Buscar Livros</label>
          <input type="text" id="portalSearch" placeholder="Título ou autor..." oninput="searchBooks()">
        </div>
        <div class="form-group" style="flex:1;min-width:130px">
          <label>Disponibilidade</label>
          <select id="portalDisp" onchange="searchBooks()">
            <option value="">Todos</option>
            <option value="sim">Disponível</option>
          </select>
        </div>
      </div>
      <div class="books-grid" id="portalBooksGrid"></div>
    </div>
  </div>

  <!-- Public Acervo Section (always visible at bottom) -->
  <div class="mt-3" id="publicAcervo">
    <div class="section-header">
      <h2>📚 Acervo Disponível</h2>
      <a href="consultar-livros.html" class="btn btn-secondary btn-sm">Ver Acervo Completo</a>
    </div>
    <div class="books-grid" id="publicBooksGrid"></div>
  </div>

</div>

<script src="js/app.js"></script>
<script>
  // ---- Carousel ----
  let carouselIdx = 0;
  let carouselInterval;

  function buildCarousel() {
    const featured = Books.getAll().filter(b=>b.quantidadeDisponivel>0).slice(0,5);
    if (!featured.length) { document.getElementById('featuredCarousel').parentElement.style.display='none'; return; }
    const track = document.getElementById('carouselTrack');
    const bookEmojis = {'Romance':'💕','Naturalismo':'🏭','Romantismo':'🌹','Modernismo':'🖊️','Fantasia':'🧙','Aventura':'🗺️','Terror':'👻','Ficção Científica':'🚀','Jovem Adulto':'🧡','Infantojuvenil':'🎨','Autobiografia':'📓'};
    track.innerHTML = featured.map(b=>`
      <div class="carousel-slide">
        <div class="carousel-book-icon">${bookEmojis[b.genero]||'📖'}</div>
        <div class="carousel-info">
          <div style="font-size:.8rem;opacity:.8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">📚 Destaque do Acervo</div>
          <h3>${b.titulo}</h3>
          <p>✍️ ${b.autor}${b.ano?` · ${b.ano}`:''}</p>
          ${b.descricao?`<p style="font-size:.85rem;opacity:.75;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${b.descricao}</p>`:''}
          <div style="margin-top:10px"><span style="background:rgba(255,255,255,.2);padding:4px 12px;border-radius:12px;font-size:.82rem">${b.quantidadeDisponivel} disponível(is)</span></div>
        </div>
      </div>`).join('');

    const dots = document.getElementById('carouselDots');
    dots.innerHTML = featured.map((_,i)=>`<button class="carousel-dot ${i===0?'active':''}" onclick="goSlide(${i})"></button>`).join('');
    carouselInterval = setInterval(()=>carouselNext(), 5000);
  }

  function goSlide(n) {
    const slides = document.querySelectorAll('.carousel-slide');
    carouselIdx = (n + slides.length) % slides.length;
    document.getElementById('carouselTrack').style.transform = `translateX(-${carouselIdx*100}%)`;
    document.querySelectorAll('.carousel-dot').forEach((d,i)=>d.classList.toggle('active',i===carouselIdx));
  }
  function carouselNext() { const n=document.querySelectorAll('.carousel-slide').length; goSlide((carouselIdx+1)%n); }
  function carouselPrev() { const n=document.querySelectorAll('.carousel-slide').length; goSlide((carouselIdx-1+n)%n); }

  // ---- Session-based student init ----
  let currentStudent = null;

  function initPortal() {
    initSampleData();
    Auth.guardAluno();
    const id = Auth.getAlunoId();
    const p = Pessoas.getById(id);
    if (!p) { Auth.logoutAluno(); return; }
    currentStudent = p;
    document.getElementById('studentAvatar').textContent = p.nome.charAt(0).toUpperCase();
    document.getElementById('studentName').textContent = p.nome;
    document.getElementById('studentInfo').textContent = `${p.tipo} · RA: ${p.ra} · Turma: ${p.turma||'-'}`;
    loadStudentData();
    buildCarousel();
  }

  function loadStudentData() {
    const loans = Emprestimos.getByPessoa(currentStudent.id);
    const ativos = loans.filter(e=>e.status!=='devolvido');
    const atrasados = loans.filter(e=>e.status==='atrasado');
    document.getElementById('sdAtivos').textContent = ativos.length;
    document.getElementById('sdAtrasados').textContent = atrasados.length;
    document.getElementById('sdHistorico').textContent = loans.length;

    // Active loans
    if (!ativos.length) {
      document.getElementById('activeLoansPortal').innerHTML = `<div class="empty-state"><div class="empty-icon">📚</div><h3>Nenhum empréstimo ativo</h3><p>Você não possui livros emprestados no momento.</p></div>`;
    } else {
      const hoje = new Date(); hoje.setHours(0,0,0,0);
      document.getElementById('activeLoansPortal').innerHTML = ativos.map(e=>{
        const b = Books.getById(e.livroId);
        const venc = new Date(e.dataPrevistaDevolucao+'T00:00:00');
        const dias = Math.floor((venc-hoje)/86400000);
        const atrasado = e.status==='atrasado';
        const multa = atrasado ? parseFloat(Emprestimos.calcMulta(e.dataPrevistaDevolucao)) : 0;
        return `<div class="loan-card ${e.status} mb-2">
          <div style="font-size:2rem">${atrasado?'⚠️':'📖'}</div>
          <div style="flex:1">
            <div class="fw-bold">${b?b.titulo:'?'}</div>
            <div class="text-muted" style="font-size:.85rem">${b?b.autor:''}</div>
            <div style="font-size:.82rem;margin-top:6px">
              📅 Empréstimo: ${formatDate(e.dataEmprestimo)} &nbsp;|&nbsp;
              ⏰ Prazo: <strong>${formatDate(e.dataPrevistaDevolucao)}</strong>
              ${atrasado?`<span class="dias-atraso" style="color:var(--danger);font-weight:700"> — ATRASADO!</span>`:`<span style="color:var(--success)"> — ${dias>0?dias+' dia(s)':'Vence hoje'}</span>`}
            </div>
            ${multa>0?`<div style="background:#fff3e0;border-radius:6px;padding:6px 10px;font-size:.82rem;color:#e65100;margin-top:6px">💰 Multa acumulada: R$ ${multa.toFixed(2)}</div>`:''}
          </div>
          ${statusBadge(e.status)}
        </div>`;
      }).join('');
    }

    // History
    const histRows = [...loans].sort((a,b)=>b.dataEmprestimo.localeCompare(a.dataEmprestimo));
    document.getElementById('historyTable').innerHTML = !histRows.length
      ? `<tr><td colspan="6" class="table-empty">Nenhum histórico</td></tr>`
      : histRows.map(e=>{
          const b=Books.getById(e.livroId);
          const multa=parseFloat(e.multa)||0;
          return `<tr>
            <td>${b?b.titulo:'-'}</td>
            <td>${formatDate(e.dataEmprestimo)}</td>
            <td>${formatDate(e.dataPrevistaDevolucao)}</td>
            <td>${e.dataDevolvido?formatDate(e.dataDevolvido):'-'}</td>
            <td>${statusBadge(e.status)}</td>
            <td>${multa>0?`<span style="color:var(--warning)">R$ ${multa.toFixed(2)}</span>`:'-'}</td>
          </tr>`;
        }).join('');

    searchBooks();
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b,i)=>{
      b.classList.toggle('active', ['loans','history','search'][i]===tab);
    });
    document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
    document.getElementById('tab'+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.add('active');
  }

  function searchBooks() {
    const q = (document.getElementById('portalSearch').value||'').toLowerCase();
    const disp = document.getElementById('portalDisp').value;
    const books = Books.getAll().filter(b=>{
      if (disp==='sim'&&b.quantidadeDisponivel<=0) return false;
      if (q&&!b.titulo.toLowerCase().includes(q)&&!b.autor.toLowerCase().includes(q)) return false;
      return true;
    }).slice(0,20);
    const bookEmojis = {'Romance':'💕','Fantasia':'🧙','Aventura':'🗺️','Terror':'👻','Ficção Científica':'🚀','Jovem Adulto':'🧡','Infantojuvenil':'🎨','Modernismo':'🖊️'};
    const grid = document.getElementById('portalBooksGrid');
    if (!books.length) { grid.innerHTML=`<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🔍</div><h3>Nenhum livro encontrado</h3></div>`; return; }
    grid.innerHTML = books.map(b=>`
      <div class="book-card">
        <div class="book-cover">
          <span style="font-size:52px">${bookEmojis[b.genero]||'📖'}</span>
          <span class="book-available-badge badge ${b.quantidadeDisponivel>0?'badge-success':'badge-danger'}">${b.quantidadeDisponivel>0?'Disponível':'Indisponível'}</span>
        </div>
        <div class="book-info">
          <div class="book-title">${b.titulo}</div>
          <div class="book-author">✍️ ${b.autor}</div>
          <div class="book-meta">
            ${b.genero?`<span class="badge badge-primary">${b.genero}</span>`:''}
            ${b.ano?`<span class="badge badge-secondary">${b.ano}</span>`:''}
          </div>
        </div>
        <div class="book-actions"><span style="font-size:.8rem;color:var(--text-light)">📦 ${b.quantidadeDisponivel}/${b.quantidade} disponíveis</span></div>
      </div>`).join('');
  }

  // Public books (visible before login)
  function renderPublicBooks() {
    const books = Books.getAll().filter(b=>b.quantidadeDisponivel>0).slice(0,8);
    const bookEmojis = {'Romance':'💕','Fantasia':'🧙','Aventura':'🗺️','Terror':'👻','Ficção Científica':'🚀','Jovem Adulto':'🧡','Infantojuvenil':'🎨','Modernismo':'🖊️'};
    document.getElementById('publicBooksGrid').innerHTML = books.map(b=>`
      <div class="book-card">
        <div class="book-cover"><span style="font-size:52px">${bookEmojis[b.genero]||'📖'}</span>
          <span class="book-available-badge badge badge-success">Disponível</span>
        </div>
        <div class="book-info">
          <div class="book-title">${b.titulo}</div>
          <div class="book-author">✍️ ${b.autor}</div>
          <div class="book-meta">${b.genero?`<span class="badge badge-primary">${b.genero}</span>`:''}</div>
        </div>
      </div>`).join('');
  }

  initPortal();
</script>
</body>
</html>
