<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>if(sessionStorage.getItem('slAdminLogged')!=='true'){window.location.replace('login.html');}</script>
  <title>Cadastrar Pessoas – Sala de Leitura</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="header">
  <div class="header-inner">
    <div class="header-logo">📚</div>
    <div class="header-titles">
      <h1>SALA DE LEITURA</h1>
      <p>EE Miquelina Pedroso Magnani Professora</p>
    </div>
    <nav class="header-nav">
      <a href="index.html" class="btn-home">🏠 Início</a>
      <a href="registrar-emprestimo.html">📤 Empréstimo</a>
    </nav>
      <button onclick="Auth.logoutAdmin()" class="btn btn-sm" style="background:rgba(239,68,68,.15);color:#fca5a5;border:1px solid rgba(239,68,68,.2);border-radius:20px;padding:5px 12px;font-size:.78rem;cursor:pointer;">Sair</button>
  </div>
</header>

<div class="page-container">
  <div class="page-title"><span>👤</span> Cadastrar Pessoas</div>
  <div class="page-subtitle">Registre alunos e professores para controle de empréstimos</div>

  <div class="card mb-3">
    <div class="card-header" id="formHeader">👤 Nova Pessoa</div>
    <div class="card-body">
      <form id="pessoaForm">
        <input type="hidden" id="pessoaId">
        <div class="form-grid">
          <div class="form-group full">
            <label>Nome Completo *</label>
            <input type="text" id="nome" placeholder="Ex: Ana Clara Souza" required>
          </div>
          <div class="form-group">
            <label>RA / Matrícula *</label>
            <input type="text" id="ra" placeholder="Ex: 2024001" required>
          </div>
          <div class="form-group">
            <label>Tipo *</label>
            <select id="tipo" required>
              <option value="Aluno">Aluno</option>
              <option value="Professor">Professor</option>
            </select>
          </div>
          <div class="form-group">
            <label>Turma / Disciplina</label>
            <input type="text" id="turma" placeholder="Ex: 9º A ou Língua Portuguesa">
          </div>
          <div class="form-group">
            <label>Telefone</label>
            <input type="tel" id="telefone" placeholder="Ex: (19) 99999-9999">
          </div>
          <div class="form-group">
            <label>E-mail</label>
            <input type="email" id="email" placeholder="Ex: aluno@escola.edu.br">
          </div>
        </div>
        <div class="form-actions mt-2">
          <button type="submit" class="btn btn-primary" id="submitBtn">💾 Salvar</button>
          <button type="button" class="btn btn-secondary" id="cancelBtn" style="display:none">❌ Cancelar</button>
          <button type="button" class="btn btn-secondary" onclick="resetForm()">🔄 Limpar</button>
        </div>
      </form>
    </div>
  </div>

  <div class="section-header">
    <h2>👥 Pessoas Cadastradas</h2>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
      <span class="total-badge" id="countBadge">0</span>
      <select id="tipoFilter" onchange="renderTable()" style="padding:7px 12px;border-radius:8px;border:1.5px solid var(--border);font-size:.85rem;">
        <option value="">Todos</option>
        <option value="Aluno">Alunos</option>
        <option value="Professor">Professores</option>
      </select>
      <input type="text" id="searchInput" placeholder="🔍 Buscar..." style="width:180px;padding:8px 12px;border-radius:20px;border:1.5px solid var(--border);font-size:.87rem;">
    </div>
  </div>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Nome</th>
          <th>RA / Matrícula</th>
          <th>Tipo</th>
          <th>Turma / Disciplina</th>
          <th>Telefone</th>
          <th>E-mail</th>
          <th>Cadastrado em</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="8" class="table-empty">Carregando...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script src="js/app.js"></script>
<script>
  let editingId = null;

  function renderTable() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const tipo = document.getElementById('tipoFilter').value;
    const pessoas = Pessoas.getAll().filter(p => {
      if (tipo && p.tipo !== tipo) return false;
      if (q && !p.nome.toLowerCase().includes(q) && !p.ra.toLowerCase().includes(q) && !(p.turma||'').toLowerCase().includes(q)) return false;
      return true;
    });
    document.getElementById('countBadge').textContent = `${pessoas.length} pessoa(s)`;
    const tbody = document.getElementById('tableBody');
    if (!pessoas.length) {
      tbody.innerHTML = `<tr><td colspan="8" class="table-empty">Nenhuma pessoa encontrada</td></tr>`;
      return;
    }
    tbody.innerHTML = pessoas.map(p => `<tr>
      <td><strong>${p.nome}</strong></td>
      <td>${p.ra}</td>
      <td><span class="badge ${p.tipo==='Aluno'?'badge-primary':'badge-info'}">${p.tipo}</span></td>
      <td>${p.turma||'-'}</td>
      <td>${p.telefone||'-'}</td>
      <td>${p.email||'-'}</td>
      <td>${formatDate(p.dataCadastro)}</td>
      <td>
        <button class="btn btn-secondary btn-sm" onclick="editPessoa('${p.id}')">✏️ Editar</button>
        <button class="btn btn-danger btn-sm" onclick="deletePessoa('${p.id}')">🗑️</button>
      </td>
    </tr>`).join('');
  }

  document.getElementById('pessoaForm').addEventListener('submit', e => {
    e.preventDefault();
    const nome = document.getElementById('nome').value.trim();
    const ra = document.getElementById('ra').value.trim();
    if (!nome || !ra) { showToast('Preencha Nome e RA/Matrícula.', 'error'); return; }

    // Check duplicate RA
    const existing = Pessoas.getAll().find(p => p.ra === ra && p.id !== editingId);
    if (existing) { showToast('Já existe uma pessoa com este RA/Matrícula.', 'error'); return; }

    const id = editingId || DB.generateId();
    const old = Pessoas.getById(id);
    Pessoas.save({
      id, nome, ra,
      tipo: document.getElementById('tipo').value,
      turma: document.getElementById('turma').value.trim(),
      telefone: document.getElementById('telefone').value.trim(),
      email: document.getElementById('email').value.trim(),
      dataCadastro: old ? old.dataCadastro : today()
    });
    showToast(editingId ? 'Pessoa atualizada!' : 'Pessoa cadastrada!');
    resetForm();
    renderTable();
  });

  function editPessoa(id) {
    const p = Pessoas.getById(id);
    if (!p) return;
    editingId = id;
    document.getElementById('nome').value = p.nome;
    document.getElementById('ra').value = p.ra;
    document.getElementById('tipo').value = p.tipo;
    document.getElementById('turma').value = p.turma||'';
    document.getElementById('telefone').value = p.telefone||'';
    document.getElementById('email').value = p.email||'';
    document.getElementById('submitBtn').textContent = '💾 Atualizar';
    document.getElementById('cancelBtn').style.display = '';
    document.getElementById('formHeader').textContent = '✏️ Editando: ' + p.nome;
    window.scrollTo({top:0,behavior:'smooth'});
  }

  function deletePessoa(id) {
    const p = Pessoas.getById(id);
    if (!p) return;
    const loans = Emprestimos.getAll().filter(e => e.pessoaId === id && e.status !== 'devolvido');
    if (loans.length > 0) { showToast('Não é possível excluir: pessoa possui empréstimos ativos.', 'error'); return; }
    if (confirm(`Excluir "${p.nome}"?`)) {
      Pessoas.delete(id);
      showToast('Pessoa excluída.', 'warning');
      renderTable();
    }
  }

  function resetForm() {
    editingId = null;
    document.getElementById('pessoaForm').reset();
    document.getElementById('submitBtn').textContent = '💾 Salvar';
    document.getElementById('cancelBtn').style.display = 'none';
    document.getElementById('formHeader').textContent = '👤 Nova Pessoa';
  }

  document.getElementById('cancelBtn').addEventListener('click', resetForm);
  document.getElementById('searchInput').addEventListener('input', renderTable);
  renderTable();
</script>
</body>
</html>
