<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acesso – Sala de Leitura</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      background: #F1F5F9;
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    }

    /* Left branding panel */
    .login-brand {
      width: 40%;
      background: linear-gradient(160deg, #0F172A 0%, #1E1B4B 50%, #3730A3 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 40px;
      color: #fff;
      position: relative;
      overflow: hidden;
    }
    .login-brand::before {
      content: '';
      position: absolute;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: rgba(99,102,241,.15);
      top: -120px; left: -120px;
    }
    .login-brand::after {
      content: '';
      position: absolute;
      width: 300px; height: 300px;
      border-radius: 50%;
      background: rgba(16,185,129,.08);
      bottom: -80px; right: -80px;
    }
    .brand-emoji {
      font-size: 5rem;
      margin-bottom: 24px;
      position: relative;
      z-index: 1;
      filter: drop-shadow(0 8px 24px rgba(0,0,0,.4));
    }
    .brand-name {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: 2px;
      text-align: center;
      position: relative;
      z-index: 1;
      line-height: 1.2;
    }
    .brand-subtitle {
      font-size: .85rem;
      opacity: .7;
      text-align: center;
      margin-top: 10px;
      position: relative;
      z-index: 1;
      max-width: 240px;
      line-height: 1.5;
    }
    .brand-tagline {
      margin-top: 32px;
      padding: 10px 20px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 20px;
      font-size: .8rem;
      opacity: .8;
      position: relative;
      z-index: 1;
      text-align: center;
    }
    .brand-dots {
      display: flex;
      gap: 8px;
      margin-top: 36px;
      position: relative;
      z-index: 1;
    }
    .brand-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
    }
    .brand-dot:nth-child(1) { background: #6366F1; }
    .brand-dot:nth-child(2) { background: #10B981; }
    .brand-dot:nth-child(3) { background: #F59E0B; }

    /* Right panel */
    .login-right {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    .login-card {
      background: #fff;
      border-radius: 20px;
      padding: 48px 44px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 20px 60px rgba(15,23,42,.1), 0 4px 16px rgba(15,23,42,.06);
    }
    .login-card h1 {
      font-size: 1.8rem;
      font-weight: 800;
      color: #0F172A;
      margin-bottom: 6px;
    }
    .login-card .subtitle {
      color: #64748B;
      font-size: .9rem;
      margin-bottom: 32px;
    }

    /* Mode tabs */
    .mode-tabs {
      display: flex;
      gap: 6px;
      background: #F1F5F9;
      border-radius: 12px;
      padding: 5px;
      margin-bottom: 28px;
    }
    .mode-tab {
      flex: 1;
      padding: 11px 8px;
      border: none;
      border-radius: 9px;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s ease;
      color: #64748B;
      background: none;
      white-space: nowrap;
    }
    .mode-tab.active {
      background: #fff;
      color: #4F46E5;
      box-shadow: 0 2px 10px rgba(79,70,229,.15);
    }

    /* Forms */
    .login-form { display: none; }
    .login-form.active { display: block; }

    .form-field {
      margin-bottom: 18px;
    }
    .form-field label {
      display: block;
      font-size: .78rem;
      font-weight: 700;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: .6px;
      margin-bottom: 7px;
    }
    .form-field input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #E2E8F0;
      border-radius: 10px;
      font-size: .95rem;
      color: #0F172A;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      background: #FAFAFA;
    }
    .form-field input:focus {
      border-color: #4F46E5;
      box-shadow: 0 0 0 3px rgba(79,70,229,.12);
      background: #fff;
    }

    .btn-login {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #4F46E5, #6366F1);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s ease;
      margin-top: 4px;
      letter-spacing: .3px;
    }
    .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(79,70,229,.35);
    }
    .btn-login:active { transform: translateY(0); }

    .btn-login.aluno-btn {
      background: linear-gradient(135deg, #059669, #10B981);
    }
    .btn-login.aluno-btn:hover {
      box-shadow: 0 6px 20px rgba(16,185,129,.35);
    }

    .hint-text {
      margin-top: 14px;
      padding: 10px 14px;
      background: #F8FAFC;
      border: 1px solid #E2E8F0;
      border-radius: 8px;
      font-size: .78rem;
      color: #64748B;
      text-align: center;
      line-height: 1.5;
    }
    .hint-text code {
      background: #EEF2FF;
      color: #4F46E5;
      padding: 1px 6px;
      border-radius: 4px;
      font-family: monospace;
      font-size: .82rem;
    }

    .error-msg {
      display: none;
      background: #FEF2F2;
      border: 1px solid #FECACA;
      border-radius: 8px;
      color: #DC2626;
      font-size: .85rem;
      padding: 10px 14px;
      margin-bottom: 16px;
      text-align: center;
    }
    .error-msg.show { display: block; }

    /* Mobile: hide brand panel */
    @media (max-width: 768px) {
      .login-brand { display: none; }
      .login-right { background: linear-gradient(160deg, #0F172A, #3730A3); }
      .login-card { padding: 36px 28px; }
    }
  </style>
</head>
<body>

<!-- Left branding panel -->
<div class="login-brand">
  <div class="brand-emoji">📚</div>
  <div class="brand-name">SALA DE LEITURA</div>
  <div class="brand-subtitle">EE Miquelina Pedroso Magnani Professora</div>
  <div class="brand-tagline">Conhecimento ao alcance de todos</div>
  <div class="brand-dots">
    <div class="brand-dot"></div>
    <div class="brand-dot"></div>
    <div class="brand-dot"></div>
  </div>
</div>

<!-- Right form panel -->
<div class="login-right">
  <div class="login-card">
    <h1>Bem-vindo</h1>
    <p class="subtitle">Selecione seu tipo de acesso para continuar.</p>

    <!-- Mode toggle tabs -->
    <div class="mode-tabs">
      <button class="mode-tab active" id="tabAdmin" onclick="switchMode('admin')">🔐 Área Administrativa</button>
      <button class="mode-tab" id="tabAluno" onclick="switchMode('aluno')">👨‍🎓 Portal do Aluno</button>
    </div>

    <!-- Error message -->
    <div class="error-msg" id="errorMsg"></div>

    <!-- Admin form -->
    <div class="login-form active" id="formAdmin">
      <div class="form-field">
        <label>Usuário</label>
        <input type="text" id="adminUser" placeholder="Digite o usuário" autocomplete="username" onkeydown="if(event.key==='Enter')doAdminLogin()">
      </div>
      <div class="form-field">
        <label>Senha</label>
        <input type="password" id="adminPass" placeholder="Digite a senha" autocomplete="current-password" onkeydown="if(event.key==='Enter')doAdminLogin()">
      </div>
      <button class="btn-login" onclick="doAdminLogin()">Entrar</button>
      <div class="hint-text">
        Credenciais padrão &nbsp;·&nbsp; Usuário: <code>admin</code> &nbsp;|&nbsp; Senha: <code>admin123</code>
      </div>
    </div>

    <!-- Aluno form -->
    <div class="login-form" id="formAluno">
      <div class="form-field">
        <label>Número de RA</label>
        <input type="text" id="alunoRA" placeholder="Ex: 2024001" autocomplete="off" onkeydown="if(event.key==='Enter')doAlunoLogin()">
      </div>
      <button class="btn-login aluno-btn" onclick="doAlunoLogin()">Acessar Portal</button>
      <div class="hint-text">
        Digite seu número de RA para acessar seu histórico de empréstimos.<br>Nenhuma senha necessária.
      </div>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script>
  // Seed data so Auth.loginAluno can find students
  initSampleData();

  function switchMode(mode) {
    document.getElementById('tabAdmin').classList.toggle('active', mode === 'admin');
    document.getElementById('tabAluno').classList.toggle('active', mode === 'aluno');
    document.getElementById('formAdmin').classList.toggle('active', mode === 'admin');
    document.getElementById('formAluno').classList.toggle('active', mode === 'aluno');
    hideError();
    if (mode === 'admin') document.getElementById('adminUser').focus();
    else document.getElementById('alunoRA').focus();
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('show');
  }

  function hideError() {
    document.getElementById('errorMsg').classList.remove('show');
  }

  function doAdminLogin() {
    hideError();
    const user = document.getElementById('adminUser').value.trim();
    const pass = document.getElementById('adminPass').value;
    if (!user || !pass) { showError('Preencha usuário e senha.'); return; }
    if (Auth.loginAdmin(user, pass)) {
      window.location.href = 'index.html';
    } else {
      showError('Usuário ou senha incorretos.');
      document.getElementById('adminPass').value = '';
      document.getElementById('adminPass').focus();
    }
  }

  function doAlunoLogin() {
    hideError();
    const ra = document.getElementById('alunoRA').value.trim();
    if (!ra) { showError('Digite seu número de RA.'); return; }
    const aluno = Auth.loginAluno(ra);
    if (aluno) {
      window.location.href = 'portal-aluno.html';
    } else {
      showError('RA não encontrado. Verifique o número e tente novamente.');
      document.getElementById('alunoRA').select();
    }
  }

  // Auto-focus first field
  document.getElementById('adminUser').focus();
</script>
</body>
</html>
